<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Электронная визитка</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

  <div class="profile-card">
    
    <div class="card-content">
      <div class="logo-container">
        <img src="logo.png" alt="Логотип" id="companyLogo">
      </div>

      <div class="photo-container">
        <img src="" id="userPhoto" alt="Фото профиля" onerror="this.src='https://via.placeholder.com/150?text=No+Photo'">
      </div>

     <div class="info">
        <h2 id="fullName">Загрузка...</h2>
        <p id="jobTitle" class="job-title"></p>
      </div>

      <div class="actions">
        <a id="btnWhatsapp" href="#" class="btn" target="_blank">
          <i class="fab fa-whatsapp"></i> Написать в WhatsApp
        </a>

        <a id="btnEmail" href="#" class="btn">
          <i class="far fa-envelope"></i> Отправить Email
        </a>

        <a id="btnAddressMain"https://2gis.kz/kk/turkestan/search/%D1%83%D0%BB%2C%20%D0%90%D0%BB%D1%82%D1%8B%D0%BD%D0%B1%D0%B5%D0%BA%D0%BE%D0%B2%2024%D0%B0/geo/70030076258909171/68.311819%2C43.323916?m=68.311915%2C43.323772%2F18.21" class="btn" target="_blank">
          <i class="fas fa-map-marker-alt"></i> Наш адрес
        </a>

        <a id="btnWebsite" href="#" class="btn" target="_blank">
          <i class="fas fa-globe"></i> Наш сайт
        </a>
      </div>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
