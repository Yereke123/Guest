<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Digital Business Card</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

  <div class="profile-card">
    
    <div class="card-content">
      <div class="logo-container">
        <img src="logo.png" alt="Logo" id="companyLogo">
      </div>

      <div class="photo-container">
        <img src="" id="userPhoto" alt="Profile Photo" onerror="this.src='https://via.placeholder.com/150?text=No+Photo'">
      </div>

     <div class="info">
        <h2 id="fullName">Loading...</h2>
        <p id="jobTitle" class="job-title"></p>
      </div>

      <div class="actions">
        <a id="btnWhatsapp" href="#" class="btn" target="_blank">
          <i class="fab fa-whatsapp"></i> WhatsApp
        </a>

        <a id="btnEmail" href="#" class="btn">
          <i class="far fa-envelope"></i> Send Email
        </a>

        <a id="btnAddressMain" href="https://go.2gis.com/AnEtj" class="btn" target="_blank">
          <i class="fas fa-map-marker-alt"></i> Our Address
        </a>

        <a id="btnWebsite" href="#" class="btn" target="_blank">
          <i class="fas fa-globe"></i> Our Website
        </a>
      </div>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
